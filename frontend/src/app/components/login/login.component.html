<!-- Fondo seguro -->
<div
	class="fixed inset-0 bg-gradient-to-b from-gray-900 via-gray-900 to-purple-800 -z-10 pointer-events-none">
</div>

<div
	class="relative min-h-screen sm:flex sm:flex-row justify-center bg-transparent rounded-3xl shadow-xl">

	<!-- Texto lateral -->
	<div class="flex-col flex self-center lg:px-14 sm:max-w-4xl xl:max-w-md z-10">
		<div class="self-start hidden lg:flex flex-col text-gray-300">
			<h1 class="my-3 font-semibold text-4xl">Bienvenido Conductor</h1>
			<p class="pr-3 text-sm opacity-75">
				Aquí encontrarás todas las cocheras de la ciudad de Rosario
			</p>
		</div>
	</div>

	<!-- Card Login -->
	<div class="flex justify-center self-center z-10">
		<div class="p-12 bg-white mx-auto rounded-3xl w-96">

			<div class="mb-7">
				<h2 class="font-semibold text-2xl text-gray-800">
					Iniciar Sesión
				</h2>

				<p class="text-gray-400">
					No tienes una cuenta?
					<a routerLink="/register"
						class="text-sm text-purple-700 hover:text-purple-600 cursor-pointer">
						Regístrate
					</a>
				</p>
			</div>

			<div class="space-y-6">

				<input [(ngModel)]="usuario"
					class="w-full text-sm px-4 py-3 bg-gray-200 focus:bg-gray-100 border border-gray-200 rounded-lg focus:outline-none focus:border-purple-400"
					placeholder="Usuario">

				<input [(ngModel)]="password"
					type="password"
					class="w-full text-sm px-4 py-3 rounded-lg bg-gray-200 focus:bg-gray-100 border border-gray-200 focus:outline-none focus:border-purple-400 text-black"
					placeholder="Password">

				<button (click)="login()"
					type="button"
					class="w-full flex justify-center bg-purple-800 hover:bg-purple-700 text-gray-100 p-3 rounded-lg tracking-wide font-semibold cursor-pointer transition ease-in duration-500">
					Sign in
				</button>

				<div class="mt-7 text-center text-gray-400 text-xs">
					<span>
						Copyright © 2021-2024 Juan y Brian
					</span>
				</div>

			</div>
		</div>
	</div>

	<!-- SVG decorativo seguro -->
	<svg
		class="absolute bottom-0 left-0 -z-10 pointer-events-none"
		xmlns="http://www.w3.org/2000/svg"
		viewBox="0 0 1440 320">
		<path fill="#fff" fill-opacity="1"
			d="M0,0L40,42.7C80,85,160,171,240,197.3C320,224,400,192,480,154.7C560,117,640,75,720,74.7C800,75,880,117,960,154.7C1040,192,1120,224,1200,213.3C1280,203,1360,149,1400,122.7L1440,96L1440,320L0,320Z">
		</path>
	</svg>

</div>
