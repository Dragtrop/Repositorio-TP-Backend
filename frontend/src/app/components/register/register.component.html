<div
	class="bg-purple-900 absolute top-0 left-0 bg-gradient-to-b from-gray-900 via-gray-900 to-purple-800 bottom-0 leading-5 h-full w-full overflow-hidden">
</div>

<div
	class="relative min-h-screen sm:flex sm:flex-row justify-center bg-transparent rounded-3xl shadow-xl">

	<!-- Texto lateral -->
	<div class="flex-col flex self-center lg:px-14 sm:max-w-4xl xl:max-w-md z-10">
		<div class="self-start hidden lg:flex flex-col text-gray-300">
			<h1 class="my-3 font-semibold text-4xl">Únete Conductor</h1>
			<p class="pr-3 text-sm opacity-75">
				Crea tu cuenta y comienza a reservar o publicar cocheras en Rosario
			</p>
		</div>
	</div>

	<!-- Card registro -->
	<div class="flex justify-center self-center z-10">
		<div class="p-12 bg-white mx-auto rounded-3xl w-96">

			<div class="mb-7">
				<h2 class="font-semibold text-2xl text-gray-800">Formulario de Registro</h2>
				<p class="text-gray-400">
					¿Ya tienes una cuenta?
					<a routerLink="/login"
						class="text-sm text-purple-700 hover:text-purple-600">
						Inicia Sesión
					</a>
				</p>
			</div>

			<div class="space-y-4">

				<input [(ngModel)]="nombre"
					class="w-full text-sm px-4 py-3 bg-gray-200 border border-gray-200 rounded-lg focus:outline-none focus:border-purple-400"
					placeholder="Nombre">

				<input [(ngModel)]="apellido"
					class="w-full text-sm px-4 py-3 bg-gray-200 border border-gray-200 rounded-lg focus:outline-none focus:border-purple-400"
					placeholder="Apellido">

				<input [(ngModel)]="telefono"
					class="w-full text-sm px-4 py-3 bg-gray-200 border border-gray-200 rounded-lg focus:outline-none focus:border-purple-400"
					placeholder="Teléfono">

				<input [(ngModel)]="mail" type="email"
					class="w-full text-sm px-4 py-3 bg-gray-200 border border-gray-200 rounded-lg focus:outline-none focus:border-purple-400"
					placeholder="Email">

				<input [(ngModel)]="usuario"
					class="w-full text-sm px-4 py-3 bg-gray-200 border border-gray-200 rounded-lg focus:outline-none focus:border-purple-400"
					placeholder="Usuario">

				<input [(ngModel)]="password" type="password"
					class="w-full text-sm px-4 py-3 bg-gray-200 border border-gray-200 rounded-lg focus:outline-none focus:border-purple-400"
					placeholder="Password">

				<select [(ngModel)]="Rol"
					class="w-full text-sm px-4 py-3 bg-gray-200 border border-gray-200 rounded-lg focus:outline-none focus:border-purple-400">
					<option value="Cliente">Cliente</option>
					<option value="Dueño">Dueño</option>
					<option value="Admin">Admin</option>
				</select>

				<button (click)="registrar()"
					class="w-full flex justify-center bg-purple-800 hover:bg-purple-700 text-gray-100 p-3 rounded-lg tracking-wide font-semibold transition ease-in duration-500"
					[disabled]="loading">
					Registrarse
				</button>

				<p *ngIf="error" class="text-red-600 text-sm text-center">
					{{ error }}
				</p>

			</div>

		</div>
	</div>

	<svg class="absolute bottom-0 left-0" xmlns="http://www.w3.org/2000/svg"
		viewBox="0 0 1440 320">
		<path fill="#fff" fill-opacity="1"
			d="M0,0L40,42.7C80,85,160,171,240,197.3C320,224,400,192,480,154.7C560,117,640,75,720,74.7C800,75,880,117,960,154.7C1040,192,1120,224,1200,213.3C1280,203,1360,149,1400,122.7L1440,96L1440,320L0,320Z">
		</path>
	</svg>
</div>
