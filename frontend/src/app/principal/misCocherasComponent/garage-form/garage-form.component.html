<div class="max-w-xl mx-auto bg-white shadow-lg rounded-xl p-8 mt-8">
  <h2 class="text-2xl font-semibold mb-6 text-gray-800">
    Crear nueva cochera
  </h2>

  <form [formGroup]="garageForm" (ngSubmit)="onSubmit()" class="space-y-5">

    <div>
      <label class="block text-gray-700 mb-1 font-medium">Dirección</label>
      <input type="text"
             formControlName="direccion"
             class="w-full border rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500">
    </div>

    <div>
      <label class="block text-gray-700 mb-1 font-medium">Cantidad de lugares</label>
      <input type="number"
             formControlName="cantLugares"
             class="w-full border rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500">
    </div>

    <div>
      <label class="block text-gray-700 mb-1 font-medium">Precio por hora</label>
      <input type="number"
             formControlName="valorCocheraxH"
             class="w-full border rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500">
    </div>
    
    <button type="submit"
            class="w-full bg-blue-600 text-white py-3 rounded-lg font-semibold hover:bg-blue-700 transition"
            [disabled]="garageForm.invalid">
            Crear Cochera
    </button>

  </form>
</div>
