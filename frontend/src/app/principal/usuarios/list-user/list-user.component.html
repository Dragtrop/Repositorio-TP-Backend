<div class="users-container" *ngIf="users.length">

  <div class="user-box" *ngFor="let user of users">

    <h3 class="user-name">
      {{ user.nombre }} {{ user.apellido }}
    </h3>

    <p class="user-mail">{{ user.mail }}</p>

    <p class="user-role">
      Rol: {{ user.Rol }}
    </p>

    <p class="user-status"
       [ngClass]="{ 'inactive': user.activo === 0 }">
      Estado: {{ user.activo === 1 ? 'Activo' : 'Inactivo' }}
    </p>

    <div class="button-group">

      <button class="btn-edit"
              (click)="addedituser(user.id)">
        Editar
      </button>

      <button class="btn-delete"
              *ngIf="user.activo === 1"
              (click)="deleteuser(user.id)">
        Desactivar
      </button>

      <button class="btn-activate"
              *ngIf="user.activo === 0"
              (click)="activateUser(user.id)">
        Activar
      </button>

    </div>

  </div>

</div>
