<div class="form-container">

  <div *ngIf="tieneVehiculo && vehiculo" class="form-box">

    <h2>Mi Vehículo</h2>

    <div class="form-group">
      <label>Patente</label>
      <input [value]="vehiculo.patente" disabled>
    </div>

    <div class="form-group">
      <label>Marca</label>
      <input [value]="vehiculo.marca" disabled>
    </div>

  </div>

  <div *ngIf="!tieneVehiculo" class="form-box">

    <h2>Vehículo</h2>

    <p style="text-align:center; margin-bottom:20px;">
      No tenés vehículo registrado
    </p>

    <div class="button-group" style="justify-content:center;">
      <button class="btn-save" (click)="agregarVehiculo()">
        Agregar Vehículo
      </button>
    </div>

  </div>

</div>
