<div class="min-h-screen bg-gray-50/50 flex overflow-hidden">

  <app-sidebar
    [visible]="sidebarVisible"
    (close)="closeSidebar()"
  ></app-sidebar>

  <div
    *ngIf="sidebarVisible"
    class="fixed inset-0 bg-black/50 z-40 xl:hidden"
    (click)="closeSidebar()"
  ></div>

  <div class="flex-1 flex flex-col xl:ml-72">

    <nav class="flex items-center px-4 py-3">

      <button
        class="xl:hidden p-2"
        type="button"
        (click)="toggleSidebar()"
        aria-label="Abrir menú"
      >
        <svg xmlns="http://www.w3.org/2000/svg"
             class="w-6 h-6 text-gray-700"
             fill="none"
             viewBox="0 0 24 24"
             stroke="currentColor">
          <path stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M4 6h16M4 12h16M4 18h16"/>
        </svg>
      </button>

      <app-header></app-header>

    </nav>

    <main class="p-4 flex-1 overflow-auto">
      <router-outlet></router-outlet>
    </main>

  </div>
</div>
